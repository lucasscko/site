<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zytraxis | Automação e Precisão</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0D0D12',
            accent: '#C9A84C',
            background: '#FAF8F5',
            dark: '#2A2A35'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            drama: ['"Playfair Display"', 'serif'],
            mono: ['"JetBrains Mono"', 'monospace']
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone (to compile JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  
  <style>
    body {
      background-color: #FAF8F5;
      color: #2A2A35;
      font-family: 'Inter', sans-serif;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.05;
    }
  </style>
</head>
<body>
  <!-- Noise Overlay Filter -->
  <svg class="hidden" style="display: none;">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </svg>
  <div class="noise-overlay" style="filter: url(#noiseFilter);"></div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;
    gsap.registerPlugin(ScrollTrigger);

    // Icons SVGs
    const IconArrowRight = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    );
    const IconActivity = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-accent"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    );
    const IconMousePointer = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/></svg>
    );
    const IconGlobe = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
    );

    const getCtaLink = (lang) => {
      const msg = lang === 'pt' 
        ? "Olá! Gostaria de saber mais sobre as soluções de automação da Zytraxis."
        : "Hello! I would like to know more about Zytraxis' automation solutions.";
      return `https://wa.me/5511940316405?text=${encodeURIComponent(msg)}`;
    };

    // Translations Dictionary
    const TRANSLATIONS = {
      pt: {
        nav_solutions: "Soluções",
        nav_methodology: "Metodologia",
        nav_contact: "Contato",
        hero_tag: "Fornecer soluções em automações",
        hero_title1: "A automação encontra a",
        hero_title2: "precisão.",
        hero_cta: "Entrar em contato",
        features_tag: "Artefatos Funcionais",
        feat1_title: "Fluxos de Trabalho Invisíveis",
        feat1_desc: "Workflows autônomos que operam em segundo plano sem intervenção manual.",
        feat2_title: "Precisão Milissegundo",
        feat2_tag: "LIVE FEED",
        feat2_desc: "Execução de tarefas complexas e processamento de dados com latência zero.",
        feat3_title: "Escalabilidade Infinita",
        feat3_desc: "Sistemas projetados para crescer dinamicamente com a sua demanda.",
        shuffler_items: ["Integração API", "Triagem de Dados", "Respostas IA"],
        typewriter_text: "> Iniciando sincronização...\n> Latência: 0.02ms\n> Carga do sistema: 12%\n> Processando 14.502 eventos...\n> OK: Sincronização concluída.\n_",
        scheduler_btn: "Save Protocol",
        philosophy_tag: "O Manifesto",
        philosophy_text1: "A maioria das empresas foca em:",
        philosophy_badge: "processos manuais",
        philosophy_text2: "Nós focamos em:",
        philosophy_highlight: "operações autônomas",
        protocol_step1_title: "Mapeamento Arquitetural",
        protocol_step1_desc: "Auditamos seus fluxos de trabalho atuais e identificamos gargalos de eficiência.",
        protocol_step2_title: "Integração Neuronal",
        protocol_step2_desc: "Conectamos todas as suas plataformas, APIs e bancos de dados em um ecossistema centralizado.",
        protocol_step3_title: "Execução Autônoma",
        protocol_step3_desc: "O sistema assume o controle, operando com latência milissegundo e escalando infinitamente.",
        footer_desc: "Soluções em automações de alta performance. Redefinindo o limite do que a sua empresa pode fazer.",
        footer_sys: "Sistema Operacional",
        footer_nav: "Navegação",
        footer_contact: "Contato",
        footer_loc: "Operação Autônoma, BR",
        footer_rights: "Todos os direitos reservados.",
        footer_priv: "Privacidade",
        footer_terms: "Termos"
      },
      en: {
        nav_solutions: "Solutions",
        nav_methodology: "Methodology",
        nav_contact: "Contact",
        hero_tag: "Providing automation solutions",
        hero_title1: "Automation meets",
        hero_title2: "precision.",
        hero_cta: "Get in touch",
        features_tag: "Functional Artifacts",
        feat1_title: "Invisible Workflows",
        feat1_desc: "Autonomous workflows that operate in the background without manual intervention.",
        feat2_title: "Millisecond Precision",
        feat2_tag: "LIVE FEED",
        feat2_desc: "Execution of complex tasks and data processing with zero latency.",
        feat3_title: "Infinite Scalability",
        feat3_desc: "Systems designed to grow dynamically with your business demands.",
        shuffler_items: ["API Integration", "Data Triage", "AI Responses"],
        typewriter_text: "> Starting synchronization...\n> Latency: 0.02ms\n> System load: 12%\n> Processing 14,502 events...\n> OK: Sync completed.\n_",
        scheduler_btn: "Save Protocol",
        philosophy_tag: "The Manifesto",
        philosophy_text1: "Most companies focus on:",
        philosophy_badge: "manual processes",
        philosophy_text2: "We focus on:",
        philosophy_highlight: "autonomous operations",
        protocol_step1_title: "Architectural Mapping",
        protocol_step1_desc: "We audit your current workflows and identify efficiency bottlenecks.",
        protocol_step2_title: "Neural Integration",
        protocol_step2_desc: "We connect all your platforms, APIs, and databases into a centralized ecosystem.",
        protocol_step3_title: "Autonomous Execution",
        protocol_step3_desc: "The system takes control, operating with millisecond latency and scaling infinitely.",
        footer_desc: "High-performance automation solutions. Redefining the limit of what your company can do.",
        footer_sys: "Operational System",
        footer_nav: "Navigation",
        footer_contact: "Contact",
        footer_loc: "Autonomous Operation, BR",
        footer_rights: "All rights reserved.",
        footer_priv: "Privacy",
        footer_terms: "Terms"
      }
    };

    const LangContext = createContext();

    // helper class merger replacing tailwind-merge and clsx for simplicity
    const cn = (...classes) => classes.filter(Boolean).join(' ');

    function App() {
      const mainRef = useRef(null);
      const [lang, setLang] = useState('pt');
      
      const t = (key) => TRANSLATIONS[lang][key] || key;

      useEffect(() => {
        document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
        
        const ctx = gsap.context(() => {
          gsap.from('.hero-element', {
            y: 40,
            opacity: 0,
            stagger: 0.08,
            duration: 1.2,
            ease: 'power3.out',
            delay: 0.2
          });

          gsap.from('.philosophy-word', {
            scrollTrigger: {
              trigger: '.philosophy-section',
              start: 'top 70%',
            },
            y: 20,
            opacity: 0,
            stagger: 0.05,
            duration: 0.8,
            ease: 'power3.out'
          });

          const cards = gsap.utils.toArray('.protocol-card');
          cards.forEach((card, i) => {
            ScrollTrigger.create({
              trigger: card,
              start: 'top top',
              pin: true,
              pinSpacing: false,
              id: 'pin-' + i
            });
            
            if (i < cards.length - 1) {
              gsap.to(card, {
                scale: 0.9,
                opacity: 0.5,
                filter: 'blur(20px)',
                scrollTrigger: {
                  trigger: cards[i + 1],
                  start: 'top bottom',
                  end: 'top top',
                  scrub: true
                }
              });
            }
          });
        }, mainRef);
        return () => ctx.revert();
      }, [lang]);

      return (
        <LangContext.Provider value={{ lang, setLang, t }}>
          <main ref={mainRef} className="relative overflow-x-hidden selection:bg-accent/30 selection:text-primary font-sans bg-background">
            <Navbar />
            <Hero />
            <Features />
            <Philosophy />
            <Protocol />
            <Footer />
          </main>
        </LangContext.Provider>
      );
    }

    function Navbar() {
      const { lang, setLang, t } = useContext(LangContext);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > window.innerHeight - 100);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const toggleLang = () => {
        setLang(prev => prev === 'pt' ? 'en' : 'pt');
      };

      return (
        <div className="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">
          <nav className={cn(
            "rounded-full px-6 py-3 transition-all duration-500 ease-[cubic-bezier(0.25,0.46,0.45,0.94)] flex items-center gap-6 md:gap-8",
            scrolled ? "bg-background/80 backdrop-blur-xl border border-primary/10 text-primary shadow-lg" : "bg-transparent text-background"
          )}>
            <span className="font-bold tracking-widest uppercase text-sm">ZYTRAXIS</span>
            <div className="hidden md:flex gap-6 text-sm font-medium">
              <a href="#features" className="hover:-translate-y-[1px] transition-transform">{t('nav_solutions')}</a>
              <a href="#protocol" className="hover:-translate-y-[1px] transition-transform">{t('nav_methodology')}</a>
            </div>
            
            <div className="flex items-center gap-3 border-l border-current/20 pl-4 md:pl-6">
              <button 
                onClick={toggleLang} 
                className="flex items-center gap-2 hover:-translate-y-[1px] transition-transform text-xs font-mono font-bold"
                title="Change language"
              >
                <IconGlobe />
                <span className="w-6">{lang === 'pt' ? 'EN' : 'PT'}</span>
              </button>

              <a href={getCtaLink(lang)} target="_blank" className="relative overflow-hidden rounded-full px-5 py-2 text-sm font-bold transition-all duration-300 hover:scale-[1.03] group bg-accent text-primary">
                <span className="relative z-10">{t('nav_contact')}</span>
              </a>
            </div>
          </nav>
        </div>
      );
    }

    function Hero() {
      const { lang, t } = useContext(LangContext);
      return (
        <section className="relative h-[100dvh] w-full flex items-end pb-24 px-6 md:px-16 overflow-hidden">
          <div className="absolute inset-0 bg-gradient-to-tr from-primary via-primary to-dark"></div>
          <div className="relative z-10 max-w-4xl text-background">
            <p className="hero-element font-mono text-accent text-sm md:text-base tracking-widest uppercase mb-4">
              {t('hero_tag')}
            </p>
            <h1 className="hero-element text-5xl md:text-7xl lg:text-8xl leading-[0.9] tracking-tight mb-8">
              <span className="font-bold block">{t('hero_title1')}</span>
              <span className="font-drama italic text-accent block mt-2" style={{ fontSize: '1.2em' }}>{t('hero_title2')}</span>
            </h1>
            <div className="hero-element flex gap-4 mt-8">
              <a href={getCtaLink(lang)} target="_blank" className="group relative overflow-hidden rounded-[2rem] bg-accent text-primary font-bold px-8 py-4 flex items-center gap-3 transition-transform duration-300 hover:scale-[1.03]">
                <span className="relative z-10">{t('hero_cta')}</span>
                <span className="relative z-10 group-hover:translate-x-1 transition-transform"><IconArrowRight/></span>
              </a>
            </div>
          </div>
        </section>
      );
    }

    function Features() {
      const { t } = useContext(LangContext);
      return (
        <section id="features" className="py-32 px-6 md:px-16 bg-background relative z-20">
          <div className="max-w-7xl mx-auto">
            <h2 className="text-sm font-mono text-primary/50 tracking-widest uppercase mb-16">{t('features_tag')}</h2>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* Card 1 */}
              <div className="bg-background rounded-[2rem] p-8 border border-dark/5 shadow-xl flex flex-col h-[400px]">
                <h3 className="text-xl font-bold mb-2">{t('feat1_title')}</h3>
                <p className="text-dark/70 text-sm mb-8">{t('feat1_desc')}</p>
                <div className="relative flex-1 mt-auto"><ShufflerWidget /></div>
              </div>

              {/* Card 2 */}
              <div className="bg-background rounded-[2rem] p-8 border border-dark/5 shadow-xl flex flex-col h-[400px]">
                <div className="flex justify-between items-start mb-2">
                  <h3 className="text-xl font-bold">{t('feat2_title')}</h3>
                  <div className="flex items-center gap-2 bg-dark/5 px-3 py-1 rounded-full text-xs font-mono">
                    <span className="w-2 h-2 rounded-full bg-accent animate-pulse"></span>{t('feat2_tag')}
                  </div>
                </div>
                <p className="text-dark/70 text-sm mb-8">{t('feat2_desc')}</p>
                <div className="flex-1 bg-primary text-background p-6 rounded-2xl font-mono text-xs overflow-hidden relative"><TypewriterWidget /></div>
              </div>

              {/* Card 3 */}
              <div className="bg-background rounded-[2rem] p-8 border border-dark/5 shadow-xl flex flex-col h-[400px]">
                <h3 className="text-xl font-bold mb-2">{t('feat3_title')}</h3>
                <p className="text-dark/70 text-sm mb-8">{t('feat3_desc')}</p>
                <div className="flex-1 mt-auto relative bg-dark/5 rounded-2xl p-4 overflow-hidden"><SchedulerWidget /></div>
              </div>

            </div>
          </div>
        </section>
      );
    }

    function ShufflerWidget() {
      const { t } = useContext(LangContext);
      const initialItems = t('shuffler_items');
      const [items, setItems] = useState(initialItems);
      
      useEffect(() => {
        setItems(t('shuffler_items'));
      }, [t]);

      useEffect(() => {
        const interval = setInterval(() => {
          setItems(prev => { const newItems = [...prev]; newItems.unshift(newItems.pop()); return newItems; });
        }, 3000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="relative w-full h-full flex items-center justify-center">
          {items.map((item, i) => (
            <div key={item + i} className="absolute w-full max-w-[200px] bg-white border border-dark/10 p-4 rounded-xl shadow-lg transition-all duration-[800ms] ease-[cubic-bezier(0.34,1.56,0.64,1)] flex items-center gap-3"
                 style={{ transform: `translateY(${i * 15}px) scale(${1 - i * 0.05})`, zIndex: 10 - i, opacity: 1 - i * 0.2 }}>
              <IconActivity />
              <span className="font-mono text-xs font-bold">{item}</span>
            </div>
          ))}
        </div>
      );
    }

    function TypewriterWidget() {
      const { t } = useContext(LangContext);
      const text = t('typewriter_text');
      const [displayedText, setDisplayedText] = useState("");
      
      useEffect(() => {
        let index = 0;
        const interval = setInterval(() => {
          setDisplayedText(text.slice(0, index));
          index++;
          if (index > text.length) { index = 0; setDisplayedText(""); }
        }, 50);
        return () => clearInterval(interval);
      }, [text]);
      
      return <div className="whitespace-pre-line break-words text-accent">{displayedText}</div>;
    }

    function SchedulerWidget() {
      const { t } = useContext(LangContext);
      const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      const [activeDay, setActiveDay] = useState(3);
      useEffect(() => {
        const tl = gsap.timeline({ repeat: -1 });
        tl.to('.fake-cursor', { x: 30, y: 15, duration: 1, ease: 'power2.inOut' })
          .to('.fake-cursor', { scale: 0.8, duration: 0.1 }).to('.fake-cursor', { scale: 1, duration: 0.1, onComplete: () => setActiveDay(4) })
          .to('.fake-cursor', { x: 120, y: 80, duration: 1.5, ease: 'power2.inOut', delay: 0.5 })
          .to('.fake-cursor', { scale: 0.8, duration: 0.1 }).to('.fake-cursor', { scale: 1, duration: 0.1, onComplete: () => setActiveDay(0) })
          .to('.fake-cursor', { opacity: 0, duration: 0.5 })
          .set('.fake-cursor', { x: -20, y: -20, opacity: 1, delay: 1 });
        return () => tl.kill();
      }, []);

      return (
        <div className="w-full h-full flex flex-col justify-between">
          <div className="grid grid-cols-7 gap-1">
            {days.map((d, i) => (
              <div key={i} className={cn("aspect-square rounded-md flex items-center justify-center text-[10px] font-mono transition-colors duration-300", activeDay === i ? "bg-accent text-primary font-bold" : "bg-dark/10 text-dark/40")}>{d}</div>
            ))}
          </div>
          <div className="flex justify-end mt-4">
            <button className="bg-primary text-background rounded-full px-4 py-1 text-[10px] font-bold">{t('scheduler_btn')}</button>
          </div>
          <div className="fake-cursor absolute top-0 left-0 z-10 pointer-events-none drop-shadow-md text-dark">
            <IconMousePointer />
          </div>
        </div>
      );
    }

    function Philosophy() {
      const { t } = useContext(LangContext);
      return (
        <section className="philosophy-section relative py-40 px-6 md:px-16 bg-primary text-background overflow-hidden z-20">
          <div className="absolute inset-0 opacity-30 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-dark to-primary mix-blend-overlay"></div>
          <div className="max-w-5xl mx-auto relative z-10">
            <p className="philosophy-word font-mono text-accent text-sm tracking-widest uppercase mb-12">{t('philosophy_tag')}</p>
            <div className="space-y-16">
              <p className="philosophy-word text-xl md:text-3xl text-background/60 max-w-2xl font-light">
                {t('philosophy_text1')} <span className="font-mono text-sm bg-white/5 px-2 py-1 rounded">{t('philosophy_badge')}</span>.
              </p>
              <h2 className="philosophy-word text-5xl md:text-7xl lg:text-8xl leading-tight">
                {t('philosophy_text2')} <span className="font-drama italic text-accent">{t('philosophy_highlight')}</span>.
              </h2>
            </div>
          </div>
        </section>
      );
    }

    function Protocol() {
      const { t } = useContext(LangContext);
      const steps = [
        { title: t('protocol_step1_title'), desc: t('protocol_step1_desc') },
        { title: t('protocol_step2_title'), desc: t('protocol_step2_desc') },
        { title: t('protocol_step3_title'), desc: t('protocol_step3_desc') }
      ];

      return (
        <section id="protocol" className="bg-background relative z-10 pb-32">
          {steps.map((step, i) => (
            <div key={i} className="protocol-card w-full h-[100dvh] flex items-center justify-center p-6 sticky top-0 bg-background border-b border-dark/5">
              <div className="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                <div className="order-2 md:order-1 relative aspect-square bg-dark/5 rounded-[3rem] overflow-hidden flex items-center justify-center">
                  {i === 0 && (
                    <div className="w-32 h-32 border-2 border-accent rounded-full animate-[spin_10s_linear_infinite] flex items-center justify-center">
                      <div className="w-24 h-24 border border-dark/20 rounded-full animate-[spin_7s_linear_infinite_reverse]"></div>
                    </div>
                  )}
                  {i === 1 && (
                    <div className="w-full h-full relative">
                      <div className="absolute inset-0 grid grid-cols-6 grid-rows-6 gap-2 p-12 opacity-20">
                        {Array.from({length: 36}).map((_, j) => <div key={j} className="bg-primary rounded-sm"></div>)}
                      </div>
                      <div className="absolute top-0 left-0 w-full h-1 bg-accent blur-[2px] animate-[ping_3s_infinite_ease-in-out]"></div>
                    </div>
                  )}
                  {i === 2 && (
                    <svg viewBox="0 0 100 50" className="w-2/3 stroke-accent stroke-[2] fill-none stroke-dasharray-[100] stroke-dashoffset-[100] animate-[dash_2s_linear_infinite]">
                      <path d="M0,25 L20,25 L30,5 L40,45 L50,25 L100,25" />
                      <style>{`@keyframes dash { to { stroke-dashoffset: 0; } }`}</style>
                    </svg>
                  )}
                </div>
                <div className="order-1 md:order-2">
                  <span className="font-mono text-accent text-sm tracking-widest">0{i + 1}</span>
                  <h2 className="text-4xl md:text-5xl font-bold mt-4 mb-6">{step.title}</h2>
                  <p className="text-dark/70 text-lg leading-relaxed">{step.desc}</p>
                </div>
              </div>
            </div>
          ))}
        </section>
      );
    }

    function Footer() {
      const { lang, t } = useContext(LangContext);
      return (
        <footer className="relative bg-primary text-background rounded-t-[4rem] px-6 md:px-16 pt-32 pb-12 mt-[-4rem] z-30">
          <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 mb-24">
            <div className="md:col-span-2">
              <h2 className="text-3xl font-bold tracking-widest uppercase mb-4">ZYTRAXIS</h2>
              <p className="text-background/50 max-w-sm mb-8">{t('footer_desc')}</p>
              <div className="flex items-center gap-3 bg-white/5 inline-flex px-4 py-2 rounded-full border border-white/10">
                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
